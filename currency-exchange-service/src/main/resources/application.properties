spring.application.name=currency-exchange

server.port=8000
spring.config.import=optional:configserver:http://localhost:8888

spring.jpa.show-sql=true
spring.datasource.url=jdbc:h2:mem:testdb
spring.jpa.defer-datasource-initialization=true

#spring.rabbitmq.host=localhost
#spring.rabbitmq.port=5672
#spring.rabbitmq.username=guest
#spring.rabbitmq.password=guest

management.endpoints.web.exposure.include=*

eureka.client.serverUrl.defaultZone = http://localhost:8761/eureka
resilience4j.retry.instances.sample-api.max-attempts=3
#resilience4j.retry.instances.sample-api.wait-duration.seconds=1
#resilience4j.retry.instances.sample-api.enable-exponential-backoff=true

resilience4j.ratelimiter.instances.sample-api.limit-for-period=1
resilience4j.ratelimiter.instances.sample-api.limit-refresh-period=10s
resilience4j.ratelimiter.instances.sample-api.timeout-duration=0